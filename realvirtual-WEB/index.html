<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e94078" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>realvirtual WEB</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100dvh; height: 100vh; overflow: hidden; background: #9a9a9a; }
    /* Scale up react-root overlay on touch devices so buttons/text are physically large enough.
       The 3D canvas is unaffected. On phones the viewport is ~360-430px CSS-wide but
       devicePixelRatio is 2-3x, making CSS-px physically tiny. */
    @media (hover: none) and (pointer: coarse) {
      #react-root { zoom: 1; }
    }
    #app { width: 100%; height: 100dvh; height: 100vh; touch-action: none; }
    #react-root { position: fixed; inset: 0; z-index: 1000; pointer-events: none; }

    /* --- Loading Overlay --- */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out;
    }
    #loading-overlay.hidden {
      display: none;
    }
    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-logo-wrap {
      position: relative;
      width: min(120px, 30vw);
      height: min(120px, 30vw);
    }

    .loader-logo {
      width: min(120px, 30vw);
      height: min(120px, 30vw);
      animation: logo-pulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(233, 64, 120, 0.6));
    }

    /* Orbiting dot */
    .orbit-ring {
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      border: 1px solid rgba(233, 64, 120, 0.12);
    }
    .orbit-dot {
      position: absolute;
      inset: -30px;
      animation: orbit-spin 2s linear infinite;
    }
    .orbit-dot::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #ff6b9d;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(233, 64, 120, 0.8), -6px 0 5px rgba(233, 64, 120, 0.3);
    }

    /* Brand name — prominent */
    .loader-brand {
      margin-top: 48px;
      color: #ccc;
      font-family: 'Segoe UI', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 1.5px;
    }

    /* Slogan — below brand */
    .loader-slogan {
      margin-top: 6px;
      color: #888;
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* GitHub link — below slogan */
    .loader-github {
      margin-top: 8px;
      color: #666;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: color 0.2s;
    }
    .loader-github:hover {
      color: #e94078;
    }

    /* Status line — subtle */
    .loader-status {
      margin-top: 10px;
      color: #666;
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    .loader-status .model-name {
      color: #999;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    /* Progress bar */
    .loader-progress-wrap {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .loader-progress-track {
      width: min(220px, 60vw);
      height: 4px;
      background: #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
    }
    .loader-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e94078, #ff6b9d);
      border-radius: 3px;
      transition: width 0.3s ease-out;
    }
    /* Indeterminate sweep when no real progress */
    .loader-progress-bar.indeterminate {
      width: 30%;
      animation: progress-sweep 1.8s ease-in-out infinite;
    }
    .loader-progress-pct {
      color: #555;
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      letter-spacing: 0.5px;
      min-height: 14px;
    }

    @keyframes logo-pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(233, 64, 120, 0.5)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 28px rgba(233, 64, 120, 0.8)); }
    }

    @keyframes orbit-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes progress-sweep {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="loader-logo-wrap">
      <div class="orbit-ring"></div>
      <div class="orbit-dot"></div>
      <img class="loader-logo" src="/logo.png" alt="realvirtual" />
    </div>
    <div class="loader-brand">realvirtual WEB</div>
    <div class="loader-slogan">Open. Light. Industrial. Anywhere.</div>
    <div class="loader-status" id="loading-status">Loading <span class="model-name" id="loading-model-name"></span></div>
    <div class="loader-progress-wrap">
      <div class="loader-progress-track"><div class="loader-progress-bar indeterminate" id="loading-progress-bar"></div></div>
      <div class="loader-progress-pct" id="loading-progress-pct"></div>
    </div>
  </div>

  <div id="react-root"></div>

  <!-- AGPL Watermark — removal requires a commercial license -->
  <a id="rv-watermark" href="https://github.com/game4automation/realvirtual-WEB" target="_blank" rel="noopener noreferrer">
    Powered by <strong>realvirtual WEB</strong> · AGPL-3.0
  </a>
  <style>
    #rv-watermark {
      position: fixed;
      bottom: 60px;
      right: 16px;
      z-index: 9999;
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      pointer-events: auto;
      letter-spacing: 0.4px;
      transition: color 0.2s;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 10px;
      border-radius: 4px;
    }
    #rv-watermark:hover {
      color: rgba(255, 255, 255, 0.9);
      background: rgba(0, 0, 0, 0.5);
    }
    #rv-watermark strong {
      font-weight: 600;
    }
  </style>

  <!-- On-screen DevTools console (opt-in via ?debug=1 URL param) -->
  <script>
    if (new URLSearchParams(location.search).has('debug')) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/eruda';
      s.onload = () => { (window).eruda?.init(); };
      document.head.appendChild(s);
    }
  </script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
